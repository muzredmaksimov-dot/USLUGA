<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>Запись подтверждена</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app success-app">
        <div class="success-screen">
            <div class="success-animation">
                <div class="success-circle">
                    <span class="success-check">✓</span>
                </div>
            </div>
            
            <h2 class="success-title">Запись подтверждена!</h2>
            <p class="success-message">Спасибо за запись! Мы ждём вас.</p>
            
            <div class="success-details-card">
                <div class="detail-row">
                    <span class="label">Номер записи</span>
                    <span id="appointment-id" class="value">—</span>
                </div>
                <div class="detail-row">
                    <span class="label">Услуга</span>
                    <span id="success-service" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Дата и время</span>
                    <span id="success-datetime" class="value highlight"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Стоимость</span>
                    <span id="success-price" class="value price"></span>
                </div>
            </div>
            
            <button id="close-btn" class="primary-btn success-btn">Закрыть</button>
        </div>
    </div>
    
    <script src="telegram.js"></script>
    <script src="success.js"></script>
</body>
</html>
